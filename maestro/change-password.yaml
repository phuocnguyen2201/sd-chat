appId: com.phuocng23000.sdchat
---
- launchApp
- assertVisible: "Chat.*"
- assertVisible: { id: "users-scroll" }
- assertVisible: ".*Settings"
- tapOn: "Settings"
- assertVisible: "PASSWORD"
- assertVisible: "••••••••"
- assertVisible: "Change"
- tapOn: "Change"
- assertVisible: "Change Password"
- tapOn: "New Password"
- inputText: ${PASSWORD}
- tapOn: "Confirm Password"
- inputText: ${PASSWORD}
- tapOn: "Update"
- assertVisible: "Password updated successfully"
- assertNotVisible: "Password updated successfully"

- tapOn: "Sign Out"
# Login again to confirm the new password
- assertVisible: "Email"
- assertVisible: "Password"
- tapOn: 
    point: '50%, 40%'
- inputText: ${EMAIL}
- tapOn: 
    point: '50%, 50%'
- inputText: ${PASSWORD}
- tapOn: "Login"
- assertVisible: "Chat.*"