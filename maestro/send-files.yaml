appId: com.phuocng23000.sdchat
---
- launchApp
- assertVisible: "Chat.*"
- assertVisible: { id: "users-scroll" }
- assertVisible: ".*Android Simulator.*"
- tapOn: ".*Android Simulator.*"
- assertVisible: "Android Simulator"
- assertVisible: "📎"
- tapOn: "📎"
- assertVisible:
    id: "toolbar"
- assertVisible: "Recent files"
- assertVisible:
    point: 0%,21%
- tapOn:
    point: 0%,21%
- assertVisible:
    id: "icon_check"
- assertVisible: "Select"
- tapOn: "Select"
- assertVisible:
    point: 88%,36%

